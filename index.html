<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Our Little Garden</title>
    <style>
      /* Splash shown while the app bundle loads; React replaces #root's
         contents on mount, which removes it automatically. */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #f5f5f0;
        color: #4a4a40;
        font-family: Georgia, "Times New Roman", serif;
      }
      #app-splash .splash-flower {
        width: 56px;
        height: 56px;
        animation: splash-bloom 1.6s ease-in-out infinite;
      }
      #app-splash .splash-title {
        font-style: italic;
        font-weight: 300;
        font-size: 26px;
        letter-spacing: 0.02em;
      }
      #app-splash .splash-sub {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        opacity: 0.45;
      }
      @keyframes splash-bloom {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
        50% { transform: scale(1.12) rotate(8deg); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <svg class="splash-flower" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="9" r="6" fill="#CC7A5C"/>
          <circle cx="22.66" cy="13.84" r="6" fill="#CC7A5C"/>
          <circle cx="20.11" cy="21.66" r="6" fill="#CC7A5C"/>
          <circle cx="11.89" cy="21.66" r="6" fill="#CC7A5C"/>
          <circle cx="9.34" cy="13.84" r="6" fill="#CC7A5C"/>
          <circle cx="16" cy="16" r="5.5" fill="#8A9A5B"/>
        </svg>
        <div class="splash-title">Our Little Garden</div>
        <div class="splash-sub">Tending to your garden&hellip;</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
